name: Docker Build (main → GHCR)

# Build and publish the miniblue container image to GHCR on every merge
# (push) to main, so consumers can pull the latest mainline build without
# waiting for a tagged release.
on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lonegunmanb/miniblue
          # Tag every main build as `main`, the short commit SHA, and `latest`
          # (since this workflow only runs on the default branch).
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
